openapi: 3.1.0
info:
  title: chat-demo API Documentation
  description: API documentation for chat-demo
  contact:
    name: Seesaw Team
    email: ga.miro3721@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: 0.0.1
servers:
- url: /
  description: Default Server URL
security:
- Bearer Authentication: []
tags:
- name: 사용자 API
  description: 사용자 정보 조회 및 검색 API
- name: 친구 API
  description: 친구 관리 및 상태 관리 API
- name: 인증 API
  description: "회원가입, 로그인 및 토큰 관리를 담당합니다."
- name: 채팅방 API
  description: 채팅방 조회 및 관리를 담당합니다.
- name: 메시지 API
  description: 메시지 이력 조회를 담당합니다.
- name: Push Device API
  description: 통합 푸시 기기 관리 API
paths:
  /api/users/{userId}:
    get:
      tags:
      - 사용자 API
      summary: 사용자 상세 조회
      description: 특정 사용자의 상세 정보 및 권한 목록을 조회합니다.
      operationId: getUserDetail
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
    put:
      tags:
      - 사용자 API
      summary: 사용자 기본정보 수정
      description: 계정 정보를 수정합니다.
      operationId: updateProfile
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"
        required: true
      responses:
        "200":
          description: OK
  /api/friends/{friendId}/block:
    put:
      tags:
      - 친구 API
      summary: 친구 차단
      operationId: blockFriend
      parameters:
      - name: friendId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
  /api/friends/{friendId}/accept:
    put:
      tags:
      - 친구 API
      summary: 친구 수락
      description: 나에게 온 친구 요청을 수락합니다.
      operationId: acceptFriend
      parameters:
      - name: friendId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
  /api/token/refresh:
    post:
      tags:
      - 인증 API
      summary: 토큰 갱신
      description: 리프레시 토큰을 사용하여 새로운 액세스 토큰을 발급합니다.
      operationId: refreshToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRefreshRequest"
        required: true
      responses:
        "200":
          description: 토큰 갱신 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/JsonWebToken"
        "401":
          description: 유효하지 않은 리프레시 토큰
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/JsonWebToken"
  /api/sign-up:
    post:
      tags:
      - 인증 API
      summary: 회원가입
      description: 새로운 사용자를 등록합니다.
      operationId: signUp
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
        required: true
      responses:
        "201":
          description: 회원가입 성공
  /api/sign-out:
    post:
      tags:
      - 인증 API
      summary: 로그아웃
      description: 액세스 토큰과 리프레시 토큰을 파기합니다.
      operationId: signOut
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRevokeRequest"
        required: true
      responses:
        "200":
          description: 로그아웃 성공
  /api/sign-in:
    post:
      tags:
      - 인증 API
      summary: 로그인
      description: 사용자 인증을 수행하고 JWT 토큰을 발급합니다.
      operationId: signIn
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInRequest"
        required: true
      responses:
        "200":
          description: 로그인 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/JsonWebToken"
        "401":
          description: 인증 실패
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/JsonWebToken"
  /api/push/devices:
    post:
      tags:
      - Push Device API
      summary: 푸시 기기 등록/갱신
      description: PWA 또는 Expo 앱의 푸시 정보를 등록합니다.
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushDeviceRegisterRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PushDeviceResponse"
  /api/friends/request:
    post:
      tags:
      - 친구 API
      summary: 친구 요청
      description: 상대방의 userId로 친구 요청을 보냅니다.
      operationId: requestFriend
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FriendRequest"
        required: true
      responses:
        "200":
          description: OK
  /api/chat-rooms:
    get:
      tags:
      - 채팅방 API
      summary: 참여 중인 채팅방 목록 조회
      description: 현재 로그인한 사용자가 참여 중인 채팅방 목록을 반환합니다.
      operationId: getChatRooms
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatRoomResponse"
    post:
      tags:
      - 채팅방 API
      summary: 채팅방 생성
      description: 새로운 채팅방을 생성하고 친구들을 초대합니다.
      operationId: createChatRoom
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRoomCreateRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ChatRoomResponse"
  /api/chat-rooms/{chatRoomId}/members:
    post:
      tags:
      - 채팅방 API
      summary: 채팅방 멤버 추가
      description: 채팅방에 새로운 멤버를 추가합니다.
      operationId: addMembers
      parameters:
      - name: chatRoomId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRoomMemberAddRequest"
        required: true
      responses:
        "200":
          description: OK
  /api/users/{userId}/password:
    patch:
      tags:
      - 사용자 API
      summary: 패스워드 변경
      description: 계정의 패스워드를 변경합니다.
      operationId: changePassword
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordChangeRequest"
        required: true
      responses:
        "200":
          description: OK
  /api/users:
    get:
      tags:
      - 사용자 API
      summary: 사용자 검색
      description: 친구 추가를 위해 사용자를 검색합니다. 계정명(username) 또는 이름(name)으로 검색 가능합니다.
      operationId: searchUsers
      parameters:
      - name: search
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/UserSearch"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
  /api/push/devices/me:
    get:
      tags:
      - Push Device API
      summary: 내 푸시 기기 목록 조회
      operationId: getMyDevices
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PushDeviceResponse"
  /api/messages:
    get:
      tags:
      - 메시지 API
      summary: 메시지 목록 조회
      description: 특정 채팅방의 메시지 이력을 페이징하여 조회합니다.
      operationId: getMessages
      parameters:
      - name: chatRoomId
        in: query
        description: 채팅방 식별자
        required: true
        schema:
          type: string
      - name: pageNumber
        in: query
        description: 페이지 번호
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: pageSize
        in: query
        description: 페이지 크기
        required: false
        schema:
          type: integer
          format: int32
          default: 30
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PagedModelMessageResponse"
  /api/friends:
    get:
      tags:
      - 친구 API
      summary: 친구 목록 조회
      description: 친구 목록을 조회합니다.
      operationId: getFriends
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendResponse"
  /api/chat-rooms/{chatRoomId}:
    get:
      tags:
      - 채팅방 API
      summary: 채팅방 상세 조회
      description: 특정 채팅방의 상세 정보와 참여자 목록을 조회합니다.
      operationId: getChatRoom
      parameters:
      - name: chatRoomId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ChatRoomResponse"
  /api/push/devices/{deviceId}:
    delete:
      tags:
      - Push Device API
      summary: 푸시 기기 등록 해제
      operationId: unregister
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
  /api/friends/{friendId}:
    delete:
      tags:
      - 친구 API
      summary: 친구 삭제/거절
      description: 친구 관계를 삭제하거나 요청을 거절합니다.
      operationId: removeFriend
      parameters:
      - name: friendId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
  /api/chat-rooms/{chatRoomId}/members/{memberId}:
    delete:
      tags:
      - 채팅방 API
      summary: 채팅방 멤버 제거
      description: 채팅방에서 멤버를 제거하거나 본인이 나갑니다.
      operationId: removeMember
      parameters:
      - name: chatRoomId
        in: path
        required: true
        schema:
          type: string
      - name: memberId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
components:
  schemas:
    UserUpdateRequest:
      type: object
      description: 사용자 기본정보 수정 요청
      properties:
        name:
          type: string
          description: 이름
          minLength: 1
      required:
      - name
    TokenRefreshRequest:
      type: object
      description: 토큰 갱신 요청
      properties:
        refreshToken:
          type: string
          description: 리프레시 토큰
          minLength: 1
      required:
      - refreshToken
    JsonWebToken:
      type: object
      description: JWT 토큰 정보
      properties:
        accessToken:
          type: string
          description: 액세스 토큰
        refreshToken:
          type: string
          description: 리프레시 토큰
        expiresIn:
          type: integer
          format: int64
          description: 만료 시간 (초)
    SignUpRequest:
      type: object
      description: 회원가입 요청
      properties:
        username:
          type: string
          description: 아이디
          minLength: 1
        password:
          type: string
          description: 패스워드
          minLength: 1
        name:
          type: string
          description: 이름
      required:
      - password
      - username
    TokenRevokeRequest:
      type: object
      description: 토큰 파기 요청
      properties:
        accessToken:
          type: string
          description: 액세스 토큰
          minLength: 1
        refreshToken:
          type: string
          description: 리프레시 토큰
          minLength: 1
      required:
      - accessToken
      - refreshToken
    SignInRequest:
      type: object
      description: 로그인 요청
      properties:
        username:
          type: string
          description: 아이디
          minLength: 1
        password:
          type: string
          description: 패스워드
          minLength: 1
      required:
      - password
      - username
    PushDeviceRegisterRequest:
      type: object
      description: 통합 푸시 기기 등록 요청
      properties:
        provider:
          type: string
          description: 푸시 서비스 제공자
          enum:
          - WEB_PUSH
          - EXPO
        token:
          type: string
          description: 푸시 토큰 (EXPO)
        endpoint:
          type: string
          description: 브라우저 푸시 서비스 주소 (WEB_PUSH)
        keys:
          type: object
          additionalProperties:
            type: string
          description: "WEB_PUSH 키 맵 (p256dh, auth)"
        platform:
          type: string
          description: 사용자 에이전트 또는 플랫폼 정보
        deviceId:
          type: string
          description: 기기 식별자 또는 명칭
      required:
      - provider
    PushDeviceResponse:
      type: object
      description: 통합 푸시 기기 정보 응답
      properties:
        id:
          type: string
          description: 식별자
        userId:
          type: string
          description: 계정 식별자
        provider:
          type: string
          description: 푸시 서비스 제공자
          enum:
          - WEB_PUSH
          - EXPO
        pushToken:
          type: string
          description: 푸시 토큰
        endpoint:
          type: string
          description: 브라우저 푸시 서비스 주소
        deviceName:
          type: string
          description: 기기 명칭
        active:
          type: boolean
          description: 활성 여부
        createdDate:
          type: string
          format: date-time
          description: 생성일시
    FriendRequest:
      type: object
      description: 친구 요청
      properties:
        username:
          type: string
          description: 친구 계정명
    ChatRoomCreateRequest:
      type: object
      description: 채팅방 생성 요청
      properties:
        name:
          type: string
          description: 채팅방 이름
          example: 점심 메뉴 정하기
          minLength: 1
        friendIds:
          type: array
          description: 초대할 친구 ID 목록
          example:
          - user-uuid-1
          - user-uuid-2
          items:
            type: string
      required:
      - name
    ChatRoomResponse:
      type: object
      description: 채팅방 응답
      properties:
        id:
          type: string
          description: 채팅방 식별자
        name:
          type: string
          description: 채팅방 이름
        createdBy:
          type: string
          description: 생성자 식별자
        createdDate:
          type: string
          format: date-time
          description: 생성 일시
        members:
          type: array
          description: 참여자 목록
          items:
            $ref: "#/components/schemas/UserResponse"
    UserResponse:
      type: object
      description: 사용자 정보 응답
      properties:
        id:
          type: string
          description: 식별자
        username:
          type: string
          description: 계정명
        name:
          type: string
          description: 이름
        registeredAt:
          type: string
          format: date-time
          description: 가입일
        contactNumber:
          type: string
          description: 연락처
        expiredDate:
          type: string
          format: date-time
          description: 만료 일시
        lockedDate:
          type: string
          format: date-time
          description: 잠금 일시
        credentialsExpiredDate:
          type: string
          format: date-time
          description: 패스워드 만료 일시
        roles:
          type: array
          description: 권한 목록
          items:
            type: string
          uniqueItems: true
    ChatRoomMemberAddRequest:
      type: object
      description: 채팅방 멤버 추가 요청
      properties:
        memberIds:
          type: array
          description: 추가할 사용자 식별자 목록
          items:
            type: string
            minLength: 1
          minItems: 1
      required:
      - memberIds
    PasswordChangeRequest:
      type: object
      description: 패스워드 변경 요청
      properties:
        newPassword:
          type: string
          description: 새 패스워드
          minLength: 1
      required:
      - newPassword
    UserSearch:
      type: object
      description: 사용자 검색 조건
      properties:
        username:
          type: string
          description: 계정명
        name:
          type: string
          description: 이름
    MessageResponse:
      type: object
      description: 메시지 응답
      properties:
        id:
          type: string
          description: 메시지 식별자
        chatRoomId:
          type: string
          description: 채팅방 식별자
        content:
          type: string
          description: 메시지 내용
        type:
          type: string
          description: 메시지 타입
          enum:
          - CHAT
          - NOTIFICATION
        mimeType:
          type: string
          description: MIME 타입
        createdDate:
          type: string
          format: date-time
          description: 생성일시
        sender:
          $ref: "#/components/schemas/UserResponse"
          description: 발신자 정보
    PageMetadata:
      type: object
      properties:
        size:
          type: integer
          format: int64
        number:
          type: integer
          format: int64
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int64
    PagedModelMessageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/MessageResponse"
        page:
          $ref: "#/components/schemas/PageMetadata"
    FriendResponse:
      type: object
      description: 친구 정보 응답
      properties:
        userId:
          type: string
          description: 내 식별자
        requesterId:
          type: string
          description: 요청자 식별자
        friend:
          $ref: "#/components/schemas/UserResponse"
          description: 친구
        status:
          type: string
          description: 상태
          enum:
          - PENDING
          - ACCEPTED
          - BLOCKED
  securitySchemes:
    Bearer Authentication:
      type: http
      description: JWT 토큰을 입력하세요. 'Bearer ' 접두사는 자동으로 추가됩니다.
      scheme: bearer
      bearerFormat: JWT
